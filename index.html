<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Raid Scheduler</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <div class="topbar">
    <h1>FF14 Raid Scheduler</h1>
    <button onclick="openModal()">＋新增成員</button>
  </div>

  <div class="grid">

    <div class="card">
      <h2>已輸入資料</h2>
      <div id="list"></div>
    </div>

    <div class="card">
      <h2>最佳時間</h2>
      <div id="result"></div>
    </div>

  </div>

</div>

<!-- modal -->
<div id="modal" class="modal hidden">
  <div class="modal-box">

    <h3>新增成員</h3>
    
    <select id="member"></select>

    <div id="form"></div>

    <div class="actions">
      <button onclick="submit()">新增</button>
      <button onclick="closeModal()">取消</button>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
