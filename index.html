<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FF14 Raid Planner</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="app">

    <header>
      <h1>FF14 Raid Planner</h1>
      <button onclick="addRow()">＋新增時段</button>
      <button onclick="calc()">計算最佳時間</button>
      <button onclick="clearAll()">清空</button>
    </header>

    <div class="layout">

      <!-- 左：輸入 -->
      <section class="panel">
        <h2>輸入時間</h2>
        <div id="members"></div>
      </section>

      <!-- 右：結果 -->
      <section class="panel">
        <h2>最佳排程</h2>
        <div id="result"></div>
      </section>

    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
