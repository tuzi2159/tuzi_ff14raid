<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>FF14 固團時間分析器</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>FF14 固團時間分析器</h1>

  <div class="container">

    <div class="input">
      <h2>輸入時段</h2>

      <div id="members"></div>

      <button onclick="addRow()">＋新增時段</button>
      <button onclick="calc()">計算</button>
      <button onclick="clearAll()">清空</button>
    </div>

    <div class="output">
      <h2>結果</h2>
      <div id="result"></div>
    </div>

  </div>

  <script src="script.js"></script>
</body>
</html>
